# Repository settings — managed by https://github.com/apps/settings

repository:
  name: terraform-gitlab-gke
  description: Terraform configuration for deploying a cost-optimized GitLab instance on GKE with Workload Identity and private cluster setup
  homepage: https://github.com/idvoretskyi/terraform-gitlab-gke
  topics:
    - gke
    - google-cloud
    - kubernetes
    - terraform
    - gitlab
    - infrastructure-as-code
    - devops
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true
